<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="m-0">Deposit Funds</h1>
      </div>
      <div class="col-sm-6">
        <ol class="breadcrumb float-sm-right">
  <li class="breadcrumb-item"><a routerLink="/app/dashboard">Home</a></li>
  <li class="breadcrumb-item"><a routerLink="/app/wallet">Wallet</a></li>
  <li class="breadcrumb-item active">Deposit</li>
</ol>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <div class="card card-success">
          <div class="card-header">
            <h3 class="card-title">Add Money to Wallet</h3>
          </div>
          
          <form (ngSubmit)="onSubmit()">
            <div class="card-body">
              
              <!-- Success Message -->
              <div *ngIf="successMessage" class="alert alert-success alert-dismissible">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <i class="icon fas fa-check"></i> {{ successMessage }}
              </div>

              <!-- Error Message -->
              <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <i class="icon fas fa-ban"></i> {{ errorMessage }}
              </div>

              <!-- Current Balance -->
              <div *ngIf="wallet" class="callout callout-info">
                <h5>Current Balance</h5>
                <p class="mb-0">₹{{ wallet.balance | number:'1.2-2' }}</p>
              </div>

              <!-- Amount Input -->
              <div class="form-group">
                <label>Amount to Deposit</label>
                <div class="input-group">
                  <div class="input-group-prepend">
                    <span class="input-group-text">₹</span>
                  </div>
                  <input 
                    type="number" 
                    class="form-control" 
                    [(ngModel)]="amount" 
                    name="amount"
                    placeholder="Enter amount"
                    step="0.01"
                    min="1"
                    required>
                </div>
              </div>

              <!-- Quick Amount Buttons -->
              <div class="form-group">
                <label>Quick Select:</label><br>
                <button type="button" class="btn btn-outline-primary btn-sm mr-2" (click)="quickAmount(1000)">
                  ₹1,000
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm mr-2" (click)="quickAmount(5000)">
                  ₹5,000
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm mr-2" (click)="quickAmount(10000)">
                  ₹10,000
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm mr-2" (click)="quickAmount(50000)">
                  ₹50,000
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm" (click)="quickAmount(100000)">
                  ₹1,00,000
                </button>
              </div>

              <!-- New Balance Preview -->
              <div *ngIf="amount > 0 && wallet" class="callout callout-success">
                <h5>New Balance After Deposit</h5>
                <h3 class="mb-0">₹{{ (wallet.balance + amount) | number:'1.2-2' }}</h3>
              </div>

              <!-- Payment Method Info
              <div class="alert alert-info">
                <h5><i class="icon fas fa-info"></i> Payment Method</h5>
                In a real application, you would integrate payment gateways like Razorpay, Stripe, etc. For this demo, funds will be added instantly.
              </div> -->

            </div>

            <div class="card-footer">
              <button 
                type="submit" 
                class="btn btn-success"
                [disabled]="isLoading || !wallet || amount <= 0">
                <span *ngIf="!isLoading">
                  <i class="fas fa-plus"></i> Deposit ₹{{ amount | number:'1.2-2' }}
                </span>
                <span *ngIf="isLoading">
                  <i class="fas fa-spinner fa-spin"></i> Processing...
                </span>
              </button>
              <button type="button" class="btn btn-default float-right" routerLink="/app/wallet">
               Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
